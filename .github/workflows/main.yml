name: CI Pipeline
on: 
    push: 
        branches: 
            - main
    pull_request:
jobs: 
    build: 
        runs-on: ubuntu-latest
        steps: 
            - name: checkout the file
              uses: actions/checkout@v3
            - name: setup the python
              uses: actions/setup-python@v4
              with: 
                  python-version: "3.10"
            - name: Install dependencies
              run: |
                  pip install -r requirements.txt
                  pip install flake8
            - name: run the flake8
              run: flake8 .
            - name: run tests
              run: |
                  pytest
